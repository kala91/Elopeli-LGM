<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Prompts - LLM Inspector</title>
        <link rel="stylesheet" href="/css/debug.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Debug Prompts Inspector</h1>
            <p>LLM-ohjattu pelin prompt-analyysi ja debuggaus</p>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Hae merkkijonoa prompteista tai vastauksista...">
            <select id="filterType">
                <option value="">Kaikki tyypit</option>
                <option value="scene_generation">Scene Generation</option>
                <option value="character_generation">Character Generation</option>
                <option value="phase_analysis">Phase Analysis</option>
            </select>
            <select id="filterChar">
                <option value="">Kaikki hahmot</option>
            </select>
            <button onclick="refreshData()">🔄 Päivitä</button>
            <button onclick="toggleAll()">↕️ Avaa/Sulje kaikki</button>
        </div>

        <div class="stats" id="stats"></div>

        <div id="loading" class="loading">Ladataan debug-dataa...</div>
        <div id="entries"></div>
        <div id="noResults" class="no-results" style="display: none;">
            Ei tuloksia suodattimilla.
        </div>
    </div>

    <script>
        let allEntries = [];
        let allCollapsed = false;
        let openEntries = new Set();

        async function loadData() {
            try {
                // Tallenna avointen merkintöjen tila ennen päivitystä
                saveOpenState();
                
                const response = await fetch('/api/debug-prompts');
                allEntries = await response.json();
                
                // Uusin ensin
                allEntries.reverse();
                
                populateFilters();
                updateStats();
                renderEntries(allEntries);
                
                // Palauta avoimet merkinnät
                restoreOpenState();
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML = '❌ Virhe ladattaessa dataa: ' + error.message;
            }
        }

        function saveOpenState() {
            openEntries.clear();
            document.querySelectorAll('.entry:not(.collapsed)').forEach(entry => {
                const index = parseInt(entry.id.replace('entry-', ''));
                openEntries.add(index);
            });
        }

        function restoreOpenState() {
            openEntries.forEach(index => {
                const entry = document.getElementById(`entry-${index}`);
                if (entry) {
                    entry.classList.remove('collapsed');
                }
            });
        }

        function populateFilters() {
            const characters = new Set();
            allEntries.forEach(entry => {
                if (entry.characterName && entry.characterName !== 'N/A') {
                    characters.add(entry.characterName);
                }
            });

            const filterChar = document.getElementById('filterChar');
            filterChar.innerHTML = '<option value="">Kaikki hahmot</option>';
            [...characters].sort().forEach(char => {
                const option = document.createElement('option');
                option.value = char;
                option.textContent = char;
                filterChar.appendChild(option);
            });
        }

        function updateStats() {
            const stats = {
                total: allEntries.length,
                scene: allEntries.filter(e => e.promptType === 'scene_generation').length,
                character: allEntries.filter(e => e.promptType === 'character_generation').length,
                world: allEntries.filter(e => e.promptType === 'world_analysis').length,
                charAnalysis: allEntries.filter(e => e.promptType === 'character_analysis').length,
                phase: allEntries.filter(e => e.promptType === 'phase_analysis').length
            };

            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <div class="label">Yhteensä</div>
                    <div class="value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Kohtaukset</div>
                    <div class="value">${stats.scene}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Hahmot</div>
                    <div class="value">${stats.character}</div>
                </div>
                <div class="stat-card">
                    <div class="label">World Builder</div>
                    <div class="value">${stats.world}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Char Builder</div>
                    <div class="value">${stats.charAnalysis}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Dramaturg</div>
                    <div class="value">${stats.phase}</div>
                </div>
            `;
        }

        function renderEntries(entries) {
            const container = document.getElementById('entries');
            const noResults = document.getElementById('noResults');

            if (entries.length === 0) {
                container.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            container.innerHTML = entries.map((entry, index) => {
                const badgeClass = entry.promptType.includes('scene') ? 'scene' :
                                   entry.promptType.includes('character_generation') ? 'character' :
                                   entry.promptType.includes('world') ? 'scene' :
                                   entry.promptType.includes('character_analysis') ? 'character' :
                                   entry.promptType.includes('phase') ? 'phase' : 'unknown';

                const metadata = entry.metadata || {};
                const metadataHTML = Object.keys(metadata).length > 0 ? `
                    <div class="metadata">
                        ${Object.entries(metadata).map(([key, val]) => `
                            <div class="metadata-item">
                                <div class="key">${key}</div>
                                <div class="val">${typeof val === 'object' ? JSON.stringify(val) : val}</div>
                            </div>
                        `).join('')}
                    </div>
                ` : '';

                return `
                    <div class="entry collapsed" id="entry-${index}">
                        <div class="entry-header" onclick="toggleEntry(${index})">
                            <div class="entry-title">
                                <span class="badge ${badgeClass}">${entry.promptType}</span>
                                <strong>${entry.characterName}</strong>
                                <span class="entry-meta">${new Date(entry.timestamp).toLocaleString('fi-FI')}</span>
                            </div>
                            <div class="toggle-icon">▼</div>
                        </div>
                        <div class="entry-content">
                            ${metadataHTML}
                            <div class="section">
                                <div class="section-title">📝 Prompt</div>
                                <div class="code-block">${escapeHtml(entry.prompt)}</div>
                            </div>
                            <div class="section">
                                <div class="section-title">💬 Response</div>
                                <div class="code-block">${escapeHtml(entry.response)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleEntry(index) {
            const entry = document.getElementById(`entry-${index}`);
            entry.classList.toggle('collapsed');
            
            // Päivitä avointen merkintöjen tila
            if (entry.classList.contains('collapsed')) {
                openEntries.delete(index);
            } else {
                openEntries.add(index);
            }
        }

        function toggleAll() {
            allCollapsed = !allCollapsed;
            document.querySelectorAll('.entry').forEach(entry => {
                if (allCollapsed) {
                    entry.classList.add('collapsed');
                } else {
                    entry.classList.remove('collapsed');
                }
            });
        }

        function filterEntries() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('filterType').value;
            const charFilter = document.getElementById('filterChar').value;

            const filtered = allEntries.filter(entry => {
                const matchSearch = !searchTerm || 
                    entry.prompt.toLowerCase().includes(searchTerm) ||
                    entry.response.toLowerCase().includes(searchTerm) ||
                    entry.characterName.toLowerCase().includes(searchTerm);

                const matchType = !typeFilter || entry.promptType === typeFilter;
                const matchChar = !charFilter || entry.characterName === charFilter;

                return matchSearch && matchType && matchChar;
            });

            renderEntries(filtered);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function refreshData() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('entries').innerHTML = '';
            loadData();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterEntries);
        document.getElementById('filterType').addEventListener('change', filterEntries);
        document.getElementById('filterChar').addEventListener('change', filterEntries);

        // Lataa data sivun latautuessa
        loadData();

        // Auto-refresh joka 30 sekuntia
        setInterval(() => {
            console.log('Auto-refresh...');
            loadData();
        }, 30000);
    </script>
</body>
</html>
